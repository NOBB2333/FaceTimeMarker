# 大模型与图像生成配置
#
# 按你的要求，API Key 直接放在项目配置里，不走环境变量。
# 注意：这里的配置不会参与视频分析缓存 key，改 Key 或模型不会导致视频重新分析。

["大模型"]
# 是否启用大模型对接。关闭时只导出参考图，不发请求。
"启用" = true

# 提供方，例如 openai、openai_compatible、custom。
"提供方" = "openai"

# 接口地址。OpenAI 官方默认是 https://api.openai.com/v1。
# 如果你用中转/兼容接口，直接改这里。
# "接口地址" = "https://api.openai.com/v1"

# API Key。默认留空，自己填。
"API Key" = "sk-74f602axxxxxxxx0377a"

# 文本/多模态模型名。留空表示由调用功能自己决定。
"模型" = "gpt-image-2"

# 单次请求超时时间，单位秒。
"超时时间秒" = 120.0

# 请求失败后的最大重试次数。
"最大重试次数" = 2

# 文本输出最大 token 数。
"最大输出Token" = 4096

# 温度。留空表示不传；需要更稳定就用 0~0.3，需要发散就用 0.7~1。
# "温度" = 0.2


["图像生成"]
# 是否启用图像生成。关闭时只导出参考图包，不生成四视图。
"启用" = true

# 图像模型名。留空表示使用实现层默认或大模型配置里的模型。
"模型" = ""

# 动作：auto / generate / edit。
# auto 让接口自动判断；edit 更适合拿参考图做修改/补全。
"动作" = "auto"

# 生成尺寸：auto / 1024x1024 / 1024x1536 / 1536x1024。
# auto 表示本项目不主动传尺寸，由 gpt-image-2 / 兼容平台决定默认分辨率。
# 想固定方形画布就改成 1024x1024；想生成横向角色设定表可试 1536x1024。
"尺寸" = "auto"

# 质量：auto / low / medium / high。
"质量" = "auto"

# 输出格式：png / webp / jpeg。
# 默认使用 webp，文件体积更小，适合本地人物档案长期保存。
# 如果你要最大兼容性，可以改成 png；OpenAI GPT Image 官方支持 png / webp / jpeg。
# 部分中转平台如果忽略该参数，后端会尽量按这里的格式做本地兜底转码。
"输出格式" = "webp"

# 背景：auto / transparent / opaque。
"背景" = "auto"

# 输入保真度：low / high。做人物参考、四视图时建议 high。
"输入保真度" = "high"

# 审核强度：auto / low。一般保持 auto。
"审核强度" = "auto"

# 输出压缩，0~100。主要给 webp / jpeg 用。
# 数值越低通常文件越小、细节损失越明显；100 最接近高质量输出。
# OpenAI GPT Image 支持该参数，但部分中转平台可能会忽略。
# 建议 webp 从 75~90 试起；png 会忽略这个参数。
"输出压缩" = 85

# 流式预览张数，0~3。0 表示不请求中间预览。
"流式预览张数" = 0

# 生成提示词模板。这里会直接覆盖代码内置默认提示词。
# 目标：动漫人物档案用角色设定参考图，而不是普通插画。
# 结构要求：
# - 单张未切分横向原图，参考动画角色设定表。
# - 主体区：正面全身、侧面全身、背面全身、45 度全身或半身姿态。
# - 右侧两列细节区：第一列放 45 度脸部特写和微表情，第二列放服装/发型/配饰细节。
# - 重点保持同一人物、同一服装、同一发色和同一画风，同时把身材比例做动漫设定稿式美化。
"提示词模板" = """
请根据我提供的参考帧，生成一张“动漫角色设定图 / 角色多视图设定表”原图。

输出必须是一张干净的横向单图，不要拆成多张文件。画面参考动画角色设定表，优先采用宽画布横向排版：
1. 左侧主体区：依次放正面全身、侧面全身、背面全身、45 度全身或半身姿态。
2. 四个主体视图高度接近、比例一致、脚底对齐，像角色设定表，不要做成普通插画构图。
3. 右侧细节区分成两列：第一列是脸部细节，放 45 度脸部特写，以及 2~3 个轻微微表情小头像。
4. 微表情可以是平静、微笑、轻微惊讶或害羞，但不要夸张变脸，不要变成另一个角色。
5. 右侧第二列是设计细节，放服装、发型、配饰或材质细节特写，重点展示领口、袖口、腰带、纹样、饰品、发梢等关键设计。

所有视图和细节必须是同一个角色：脸型、眼睛、发型、发色、服装、配饰、主色调、年龄感、气质和画风都要保持一致。
优先参考我提供的图片中被框选或最清晰的人物，不要把背景、路人或其他角色混进来。

全身比例需要做“动漫角色设定稿”的理想化美化：头身比更修长，腰线略高，腿部明显修长，腿长占比更漂亮，肩腰腿比例干净利落，站姿挺拔自然，整体接近动漫中的完美身材。
这种美化只允许优化身材比例和姿态，不允许改脸、改发型、改发色、改服装结构、改角色身份，也不要把角色改成另一个人。

画风要求：动漫角色设定稿、清晰线稿、轮廓明确、赛璐璐平涂、光照中性、白色或浅灰纯色背景。

禁止出现：文字、标签、说明、签名、水印、UI 元素、Logo、对白气泡、多个角色、额外肢体、重复头部、随机道具、换装、发型或发色漂移、不同画风混杂。
"""
