# 输出、数据库与人物库配置

["输出"]
# 所有分析结果、缓存、截图、参考图默认输出到这里。
"根目录" = "_outputs"

# 是否写 timeline.json。
"写入JSON" = true

# 是否写 CSV 时间轴。
"写入CSV" = true

# 是否保存每条轨迹的代表人脸图。
"保存代表人脸" = true

# 是否把人物出现片段裁成视频片段。打开后会更耗时、更占空间。
"保存人物片段" = false


["源媒体"]
# 是否把服务端路径视频复制到项目目录再分析。默认 false，直接链接源文件。
# 这和剪辑软件类似：源文件还在原路径就直接读取；丢失时需要重新链接。
# 注意：浏览器“上传视频”拿不到你的本机真实路径，只能复制上传内容。
"拷贝源文件" = false

# 浏览器上传时保存到 data/uploads 的命名方式：
# original：尽量保留原始文件名，重名时追加短后缀。
# hash：使用随机哈希文件名。
"上传保存命名" = "original"


["人物库"]
# 是否启用跨视频人物库。打开后会把同一个人在多集/多个视频里的观测合并。
"启用" = true

# 人物库路径。默认不写时使用 输出根目录/people_index.json。
# "路径" = "_outputs/people_index.json"

# 跨视频人物匹配阈值。越高越严格，越低越容易把不同视频里的人合并。
"匹配阈值" = 0.55


["数据库"]
# 本地 SQLite 数据库路径，前端和 API 都从这里读分析结果。
"路径" = "_outputs/facetimemarker.db"

# SQLAlchemy 数据库 URL。默认留空时使用上面的本地 SQLite 路径。
# 以后要切 PostgreSQL/MySQL 等数据库时，在这里写完整 URL；不需要环境变量。
# 当前项目仍建议先使用默认 SQLite，等复杂旧库迁移完全稳定后再切远程库。
# "URL" = "postgresql+psycopg://user:password@127.0.0.1:5432/facetimemarker"
