# 动漫/低清素材：偏召回，优先把漏掉的主角、小脸、动作快镜头找出来。
#
# 使用方式：
# - 网页左侧“配置文件”填写 configs/profiles/anime-high-recall.toml
# - 或 CLI: uv run facetimemarker analyze video.mp4 --config configs/profiles/anime-high-recall.toml --no-cache
#
# 代价：
# - 会更慢。
# - 误检和人物分裂可能增加，需要在工作台里再整理。

"包含配置" = ["../default.toml"]

["视频"]
# 增加抽帧密度，减少“好几秒才更新一次”的感觉。
"采样帧率" = 5.0

# 保留更小的人脸。主角远景漏检时可以先试 24。
"最小人脸尺寸" = 24


["人脸"]
# 更大的检测输入尺寸更容易发现小脸，但更耗时。
"检测尺寸" = [960, 960]

# 降低检测阈值，提高召回；如果背景误检明显增多，改回 0.5 或 0.55。
"检测置信度阈值" = 0.45


["跟踪"]
# 保留短暂出场，避免过早过滤主角快速动作镜头。
"最小连续帧数" = 1

# 提高遮挡/转头后的轨迹延续能力。
"丢失轨迹缓冲帧数" = 45


["聚类"]
# 稍微放宽短轨迹进入聚类的条件，减少主角短片段被当成噪声。
"最小样本数" = 2
"最小簇大小" = 2
