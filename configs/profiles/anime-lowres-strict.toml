# 低分辨率动漫：偏严格，优先减少墙壁、纹理、局部眼睛被误识别人脸。
#
# 使用方式：
# - 网页左侧“配置文件”填写 configs/profiles/anime-lowres-strict.toml
# - 或 CLI: uv run facetimemarker analyze video.mp4 --config configs/profiles/anime-lowres-strict.toml --no-cache
#
# 代价：
# - 误检会少一些。
# - 远景小脸、短暂出场人物更容易被过滤掉。

"包含配置" = ["../default.toml"]

["视频"]
# 提高采样密度，让动作幅度大、红框跳动慢的镜头更容易被覆盖。
"采样帧率" = 5.0

# 提高小脸过滤阈值，减少背景小花纹、局部五官误检。
"最小人脸尺寸" = 40


["人脸"]
# 严格一点的人脸检测阈值。误检仍多时可试 0.65。
"检测置信度阈值" = 0.62


["跟踪"]
# 至少连续命中 2 次才保留，过滤只闪一下的背景误检。
"最小连续帧数" = 2

# 略微降低保留丢失轨迹的帧数，减少动作切换时串人。
"丢失轨迹缓冲帧数" = 25

# 提高匹配阈值，降低不同人被接到同一轨迹的概率。
"最小匹配阈值" = 0.85


["聚类"]
# 聚类更保守，减少噪声人物。
"最小样本数" = 4
"最小簇大小" = 4
