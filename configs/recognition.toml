# 识别与时间轴配置
#
# 调参建议：
# 1. 漏脸、小脸、动作快：优先提高「采样帧率」，再降低「最小人脸尺寸」和「检测置信度阈值」。
# 2. 红框偶尔框到眼睛/局部脸：提高「检测置信度阈值」或「最小连续帧数」。
# 3. 人物轨迹断开：提高「采样帧率」或「丢失轨迹缓冲帧数」。
# 4. 人物轨迹串人：提高「最小匹配阈值」或降低「丢失轨迹缓冲帧数」。
# 5. 动漫/低分辨率视频把墙壁、花纹、背景误识别成人脸：优先提高「检测置信度阈值」，
#    再提高「最小人脸尺寸」和「最小连续帧数」；不要一上来降低阈值。

["视频"]
# 每秒抽几帧做人脸检测。默认 2.0 表示大约每 0.5 秒检测一次。
# 漏检多、动作快、红框跳得慢：改成 5.0；多人/小脸/动作很多：可以试 8.0。
# 数值越大越准，但分析越慢。
"采样帧率" = 2.0

# 过滤掉宽或高小于该值的人脸框，单位是像素。
# 小脸漏检：降到 24 或 16；误检小局部：升到 40。
"最小人脸尺寸" = 32


["人脸"]
# 当前只支持 insightface。后续如果接别的人脸模型，再扩展这个字段。
"提供方" = "insightface"

# InsightFace 模型名。buffalo_l 准确率较好，速度比小模型慢。
"模型名称" = "buffalo_l"

# 检测输入尺寸。默认 [640, 640]。
# 小脸/远景不准：可以试 [960, 960] 或 [1280, 1280]；越大越慢、越吃内存。
"检测尺寸" = [640, 640]

# 人脸检测置信度阈值，范围 0~1。
# 漏脸多：降到 0.45 或 0.4；误框眼睛/局部脸/背景：升到 0.55~0.65。
# 动漫低分辨率误检墙壁/纹理：先试 0.6，再试 0.65。
"检测置信度阈值" = 0.5

# 硬件执行策略：auto / cpu / apple / nvidia / intel。
# apple 适合 Apple Silicon；nvidia 需要 CUDA 版 ONNX Runtime；intel 可尝试 OpenVINO。
"执行提供方策略" = "auto"

# true 表示 GPU/CoreML/OpenVINO 初始化失败时自动退回 CPU。
# 如果你想强制发现硬件配置错误，可以改成 false。
"允许CPU降级" = true

# ONNX Runtime 执行 provider 明细。一般优先用「执行提供方策略」，这里作为底层覆盖项。
"ONNX执行提供方" = ["CPUExecutionProvider"]


["跟踪"]
# 当前默认使用 BoxMOT 的 BoT-SORT 跟踪器。
"提供方" = "boxmot_botsort"

# 跟踪算法名，目前用于说明和兼容。
"算法" = "botsort"

# 轨迹激活阈值。越高越保守，越低越容易生成新轨迹。
# 误检多：适当升高；轨迹起不来：适当降低。
"轨迹激活阈值" = 0.25

# 丢失多少帧内还保留旧轨迹。注意这里按视频原始帧率理解，不是采样帧率。
# 人物短暂遮挡/快速转头导致断轨：升到 45 或 60；串人：降到 15~25。
"丢失轨迹缓冲帧数" = 30

# 跟踪匹配阈值。越高越不容易把不同检测合并到同一轨迹。
# 串人：升高；同一个人被拆成很多轨迹：降低。
"最小匹配阈值" = 0.8

# 至少连续命中几次才保留轨迹。
# 误框眼睛/局部脸：改成 2 或 3；极短出场也要保留：用 1。
# 背景偶然被识别成人脸：改成 2 或 3，能过滤只闪一下的误检。
"最小连续帧数" = 1

# 相机运动补偿方法。摄像机/画面运动明显时可保持 ecc；如果补偿异常可改 none。
"相机运动补偿方法" = "ecc"

# 空间接近阈值。越高越强调框位置接近，越低越宽松。
"空间接近阈值" = 0.5

# 外观相似阈值。越高越强调人脸 embedding 相似。
# 串人：升高；同人拆轨：降低。
"外观相似阈值" = 0.25


["聚类"]
# 人脸轨迹聚类提供方：hdbscan / dbscan。
"提供方" = "hdbscan"

# 如果你明确知道视频里有几个人，可以填数字，例如 4。
# 默认不填，由聚类自动判断。
# "预设人物数量" = 4

# DBSCAN 邻域半径。数值越大越容易把轨迹合并成同一个人。
# 同一个人被分裂：略微升高；不同人被合并：略微降低。
"DBSCAN邻域半径" = 0.45

# HDBSCAN/DBSCAN 的最小样本数。越大越保守，短轨迹更容易被当成噪声。
"最小样本数" = 3

# HDBSCAN 最小簇大小。越大越保守，人物更少但可能漏掉小角色。
"最小簇大小" = 3

# HDBSCAN 簇选择距离。一般保持 0；需要更积极合并时再小幅增加。
"簇选择距离" = 0.0


["时间轴"]
# 同一人物两个片段之间小于等于该秒数时会合并。
# 想减少碎片：升到 2~3；想保留精细出入场：降到 0.3~0.5。
"合并间隔秒数" = 1.0
