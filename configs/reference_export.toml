# 逐帧框与参考图导出配置

["逐帧框"]
# 是否把每个抽样帧的人脸框写入 SQLite。
# 这不会额外跑人脸模型，只是把分析阶段已经得到的 detection 保存下来。
"写入SQLite" = true

# 前端播放红框是否优先使用逐帧框，而不是 track 的代表框。
"播放红框使用逐帧框" = true

# 当前播放时间和最近检测帧相差多少秒以内，才显示该帧框。
# 采样帧率低时可调大；太大可能导致红框滞留。
"最近帧容忍秒数" = 0.8

# 后端一次接口最多返回多少条逐帧框，防止超长视频把前端撑爆。
"接口最大返回行数" = 20000


["参考图导出"]
# 导出的参考图放在 输出根目录/视频名/该子目录 下。
"输出子目录" = "references"

# 每个人默认导出多少张参考图。
"每人导出张数" = 12

# 抽帧策略：
# best：优先选清晰、置信度高、脸大的帧。
# even：在人物出现区间里均匀抽。
# around_representative：围绕代表帧附近抽。
"抽帧策略" = "best"

# 裁剪模式：
# full_frame：整帧导出，保留画面上下文。
# face_crop：只裁脸。
# square_context：以脸为中心裁正方形上下文。
"裁剪模式" = "full_frame"

# true 时同时导出无框图和带框图；false 时只导出带框/按下面开关决定。
"同时导出无框原图" = true

# 是否在导出图上画人脸框。给多模态模型看图时建议打开。
"保留人脸框" = true

# 是否在图片角落写入人物标签/track 信息。
"写入人物标签" = true

# 人脸框颜色。建议黄色，给 GPT 看图时比较醒目。
"人脸框颜色" = "#ffd84d"

# 框线粗细，单位像素。
"框线粗细" = 3

# 导出图片格式：jpg / png / webp。
"输出格式" = "jpg"

# JPG 质量，1~100。越高越清晰也越大。
"JPEG质量" = 95

# 输出长边尺寸。默认不缩放；例如 1536 表示最长边缩放到 1536。
# "输出长边尺寸" = 1536

# 是否写 manifest.json，记录每张图来自哪个视频、时间戳、人物、bbox。
"写入清单" = true
